
server:
  port: 8080

spring:
  # ---- DataSource (Local PostgreSQL) ----
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/thesis_management
    username: sad_admin
    password: sad_secret_2026
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ---- JPA / Hibernate ----
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ---- Security / OAuth2 Resource Server (Zitadel SSO) ----
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18080

# ---- Zitadel introspection (Local) ----
zitadel:
  introspection:
    client-id: 362704457538011138@thesis_management_system
    client-secret: agPaB6vl8QpA8xSl28blUpBI0RV5AbCeL7hFsoavbC0xPT8gsqhWoxyzAA4nkY0U

# ---- Logging (verbose for dev) ----
logging:
  level:
    root: INFO
    com.phenikaa.thesis: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

# ---- SpringDoc (enabled in dev) ----
springdoc:
  swagger-ui:
    enabled: true
