# ============================================================
# ThesisHub PKA - Common Configuration
# ============================================================
# Profile mặc định: dev
# Chạy prod: java -jar app.jar --spring.profiles.active=prod

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: thesis-management

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ---- Caching (Caffeine) ----
  cache:
    type: caffeine
    cache-names:
      - majors
      - faculties
      - batches
    caffeine:
      spec: expireAfterWrite=60m,maximumSize=500

  # ---- JPA / Hibernate (common) ----
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  # ---- Liquibase ----
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: false

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

# ---- Server ----
server:
  port: ${SERVER_PORT:8080}

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ThesisHub PKA
    description: Nền tảng Quản lý Đồ án Tốt nghiệp - Đại học Phenikaa
    version: 1.0.0

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
