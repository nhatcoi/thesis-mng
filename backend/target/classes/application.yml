# ============================================================
# Thesis Management System - Application Configuration
# ============================================================

server:
  port: 8080

spring:
  application:
    name: thesis-management

  # ---- DataSource ----
  datasource:
    url: jdbc:postgresql://localhost:5432/thesis_management
    username: sad_admin
    password: sad_secret_2026
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ---- JPA / Hibernate ----
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  # ---- Liquibase ----
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # ---- Security / OAuth2 (Zitadel SSO) ----
  security:
    oauth2:
      client:
        registration:
          zitadel:
            client-id: 362625594153828355@thesis-management
            client-secret: yJ1uYXfsaatuE5BhIrtxD3FjCPRXVxYakMQvlLoWjcAXjLTlce5WDGA0Zund1mdc
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          zitadel:
            issuer-uri: http://localhost:18080
            user-name-attribute: preferred_username
      resourceserver:
        jwt:
          issuer-uri: http://localhost:18080

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Thesis Management System
    description: Hệ thống Quản lý Đồ án Tốt nghiệp - Đại học Phenikaa
    version: 0.0.1-SNAPSHOT

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ---- Logging ----
logging:
  level:
    com.phenikaa.thesis: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
